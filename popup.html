<!doctype html>
<html>
  <head>
    <title>LinkedIn Scraper</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 380px;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: linear-gradient(
          135deg,
          #0a0f1c 0%,
          #111827 50%,
          #0d1526 100%
        );
        color: #e2e8f0;
        padding: 0;
        overflow: hidden;
      }

      .header {
        background: linear-gradient(135deg, #0077b5 0%, #005885 100%);
        padding: 18px 20px;
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .header::before {
        content: "";
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.06) 0%,
          transparent 60%
        );
        pointer-events: none;
      }

      .header h2 {
        font-size: 17px;
        font-weight: 700;
        color: #fff;
        letter-spacing: -0.3px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .header h2 .logo {
        width: 22px;
        height: 22px;
        background: #fff;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        color: #0077b5;
        font-size: 14px;
      }

      .header .subtitle {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.7);
        margin-top: 4px;
        font-weight: 400;
      }

      .container {
        padding: 16px 18px;
      }

      /* Auth Section */
      .auth-section {
        margin-bottom: 14px;
      }

      .btn-connect {
        width: 100%;
        padding: 10px 14px;
        background: linear-gradient(135deg, #1e3a5f 0%, #1a2f4a 100%);
        color: #7db8e0;
        border: 1px solid rgba(59, 130, 246, 0.25);
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-size: 13px;
        font-family: inherit;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .btn-connect:hover {
        background: linear-gradient(135deg, #234b73 0%, #1f3757 100%);
        border-color: rgba(59, 130, 246, 0.45);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(0, 119, 181, 0.15);
      }

      .btn-connect.connected {
        background: linear-gradient(135deg, #064e3b 0%, #065f46 100%);
        border-color: rgba(16, 185, 129, 0.35);
        color: #6ee7b7;
        cursor: default;
      }

      .btn-connect .icon {
        font-size: 16px;
      }

      /* Sheet Info */
      .sheet-info {
        background: linear-gradient(
          135deg,
          rgba(59, 130, 246, 0.08) 0%,
          rgba(59, 130, 246, 0.04) 100%
        );
        border: 1px solid rgba(59, 130, 246, 0.15);
        color: #93c5fd;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 12px;
        margin-bottom: 14px;
        display: none;
        font-weight: 500;
      }

      .sheet-info .sheet-icon {
        margin-right: 6px;
      }

      /* Profile Info */
      .profile-info {
        background: linear-gradient(
          135deg,
          rgba(16, 185, 129, 0.08) 0%,
          rgba(16, 185, 129, 0.03) 100%
        );
        border: 1px solid rgba(16, 185, 129, 0.15);
        color: #6ee7b7;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 12px;
        margin-bottom: 14px;
        display: none;
        font-weight: 500;
      }

      /* Divider */
      .divider {
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.08),
          transparent
        );
        margin: 14px 0;
      }

      /* Zoho Info */
      .zoho-info {
        background: linear-gradient(
          135deg,
          rgba(245, 158, 11, 0.08) 0%,
          rgba(245, 158, 11, 0.03) 100%
        );
        border: 1px solid rgba(245, 158, 11, 0.15);
        padding: 10px 14px;
        border-radius: 8px;
        margin-bottom: 14px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .zoho-toggle {
        display: flex;
        align-items: center;
        cursor: pointer;
      }

      .zoho-label-text {
        margin-left: 8px;
        font-size: 13px;
        font-weight: 600;
        color: #fcd34d;
      }

      #zoho-job-container {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      #zoho-job-select {
        width: 100%;
        padding: 6px 8px;
        background: rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(245, 158, 11, 0.3);
        border-radius: 6px;
        color: #fef3c7;
        font-family: inherit;
        font-size: 12px;
        outline: none;
      }

      #zoho-job-select:focus {
        border-color: #f59e0b;
      }

      .zoho-settings-link {
        align-self: flex-end;
      }

      .zoho-settings-link a {
        color: #fbbf24;
        text-decoration: none;
        font-size: 11px;
      }
      
      .zoho-settings-link a:hover {
        text-decoration: underline;
      }
      .divider {
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.08),
          transparent
        );
        margin: 14px 0;
      }

      /* Action Buttons */
      .actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 14px;
      }

      .btn-action {
        width: 100%;
        padding: 12px 16px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        font-size: 13px;
        font-family: inherit;
        transition: all 0.25s ease;
        display: flex;
        align-items: center;
        gap: 10px;
        position: relative;
        overflow: hidden;
      }

      .btn-action::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.05) 0%,
          transparent 100%
        );
        pointer-events: none;
      }

      .btn-quick {
        background: linear-gradient(135deg, #0077b5 0%, #005f92 100%);
        color: #fff;
        box-shadow: 0 2px 8px rgba(0, 119, 181, 0.25);
      }

      .btn-quick:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 119, 181, 0.35);
      }

      .btn-full {
        background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
        color: #fff;
        box-shadow: 0 2px 8px rgba(124, 58, 237, 0.25);
      }

      .btn-full:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(124, 58, 237, 0.35);
      }

      .btn-action:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none !important;
        box-shadow: none !important;
      }

      .btn-action .btn-icon {
        font-size: 18px;
        flex-shrink: 0;
      }

      .btn-action .btn-text {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
      }

      .btn-action .btn-label {
        font-size: 13px;
        font-weight: 600;
      }

      .btn-action .btn-desc {
        font-size: 10px;
        opacity: 0.75;
        font-weight: 400;
        margin-top: 1px;
      }

      /* Status */
      .status-box {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 8px;
        padding: 12px 14px;
        font-size: 12px;
        color: #94a3b8;
        min-height: 40px;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .status-box.success {
        border-color: rgba(16, 185, 129, 0.25);
        color: #6ee7b7;
      }

      .status-box.error {
        border-color: rgba(239, 68, 68, 0.25);
        color: #fca5a5;
      }

      .status-box.working {
        border-color: rgba(251, 191, 36, 0.25);
        color: #fcd34d;
      }

      /* Loading spinner */
      .spinner {
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-top: 2px solid #fcd34d;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-right: 6px;
        vertical-align: middle;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Warning text */
      .safety-note {
        font-size: 10px;
        color: #64748b;
        text-align: center;
        margin-top: 12px;
        line-height: 1.4;
      }

      .safety-note .shield {
        color: #10b981;
      }
    </style>
  </head>

  <body>
    <div class="header">
      <h2>
        <span class="logo">in</span>
        LinkedIn Scraper
      </h2>
      <div class="subtitle">Extract profile data to Google Sheets</div>
    </div>

    <div class="container">
      <!-- Auth -->
      <div class="auth-section">
        <button id="login-btn" class="btn-connect">
          <span class="icon">🔗</span>
          Connect Google Account
        </button>
      </div>

      <!-- Sheet Status -->
      <div id="sheet-status" class="sheet-info">
        <span class="sheet-icon">📊</span>
        <span id="sheet-text">Detecting sheet...</span>
      </div>

      <!-- Profile Status -->
      <div id="profile-status" class="profile-info">
        <span>👤</span>
        <span id="profile-text">Detecting profile...</span>
      </div>

      <!-- Zoho Section -->
      <div id="zoho-section" class="zoho-info">
        <label class="zoho-toggle">
          <input type="checkbox" id="save-zoho-cb" checked />
          <span class="zoho-label-text">Save to Zoho Recruit</span>
        </label>
        <div id="zoho-job-container">
          <select id="zoho-job-select">
            <option value="">Loading jobs...</option>
          </select>
          <div class="zoho-settings-link">
            <a href="#" id="open-options">⚙️ Settings</a>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Actions -->
      <div class="actions">
        <button id="quick-btn" class="btn-action btn-quick" disabled>
          <span class="btn-icon">⚡</span>
          <span class="btn-text">
            <span class="btn-label">Quick Add</span>
            <span class="btn-desc">Save name & LinkedIn URL only</span>
          </span>
        </button>

        <button id="full-btn" class="btn-action btn-full" disabled>
          <span class="btn-icon">📋</span>
          <span class="btn-text">
            <span class="btn-label">Full Scrape</span>
            <span class="btn-desc">Extract complete profile details</span>
          </span>
        </button>
      </div>

      <!-- Status -->
      <div id="status" class="status-box">
        Open a LinkedIn profile & a Google Sheet to start.
      </div>

      <div class="safety-note">
        <span class="shield">🛡️</span> Anti-ban: Human-like delays & no rapid
        requests
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
